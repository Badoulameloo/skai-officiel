<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Panier - SKAÏ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Styles rapides pour s'assurer que le panier est propre */
        .cart-container { max-width: 1000px; margin: 50px auto; padding: 20px; display: flex; gap: 30px; justify-content: space-between; }
        .cart-items { flex: 2; }
        .cart-summary { flex: 1; background: #f9f9f9; padding: 20px; border-radius: 5px; height: fit-content; }
        .product-card { display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #eee; padding: 15px 0; }
        .product-card img { width: 100px; height: 120px; object-fit: cover; }
        .checkout-btn { 
            width: 100%; 
            background: #33241e; 
            color: white; 
            border: none; 
            padding: 15px; 
            text-transform: uppercase; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px;
            transition: 0.3s;
        }
        .checkout-btn:hover { background: #1a1310; }
    </style>
</head>
<body>
    <header>
        <nav style="display: flex; justify-content: center; padding: 20px;">
            <div class="logo" style="font-size: 2rem; letter-spacing: 5px; font-weight: bold;">SKAÏ</div>
        </nav>
    </header>

    <main>
    <h1 style="text-align: center; margin-top: 30px;">Votre Panier</h1>
    
    <div class="cart-container" id="cart-content">
        <div class="cart-items" id="product-1">
            <div class="product-card">
                <img src="produit1.jpg" alt="Produit SKAÏ">
                <div class="product-info">
                    <h3>PRODUIT SKAÏ</h3>
                    <p>15 000 FCFA</p>
                    <button onclick="supprimerProduit()" style="background:none; border:none; color: #b22222; text-decoration: underline; cursor:pointer;">Supprimer</button>
                </div>
            </div>
        </div>

        <div class="cart-summary">
            <h2>Résumé</h2>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Sous-total</span>
                <span id="subtotal">15 000 FCFA</span>
            </div>
            
            <hr>
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-top: 10px;">
                <span>Total</span>
                <span id="total-cart">15 000 FCFA</span>
            </div>

            <p style="font-size: 0.8rem; color: gray; margin-top: 10px;">
                * Les frais de livraison seront calculés à l'étape suivante.
            </p>

            <button type="button" id="btn-payer" onclick="window.location.href='paiement.html'" class="checkout-btn">
                PROCÉDER AU PAIEMENT
            </button>
        </div>
    </div>

    <div id="empty-message" style="display:none; text-align:center; margin-top:50px;">
        <p>Votre panier est vide.</p>
        <a href="boutique.html" style="color: #33241e; font-weight:bold;">Retourner à la boutique</a>
    </div>
</main>

<script>
// Fonction pour mettre à jour l'affichage au chargement de la page
function chargerPanier() {
    const panierVide = localStorage.getItem('panier_est_vide');
    
    if (panierVide === 'true') {
        document.getElementById('cart-content').style.display = 'none';
        document.getElementById('empty-message').style.display = 'block';
        // On force le compteur à 0 si on a un élément d'en-tête pour ça
        updateBadge(0);
    } else {
        // Par défaut, on affiche le produit (compteur à 1)
        updateBadge(1);
    }
}

function supprimerProduit() {
    // 1. Cacher l'affichage
    document.getElementById('cart-content').style.display = 'none';
    document.getElementById('empty-message').style.display = 'block';
    
    // 2. ENREGISTRER l'état dans la mémoire du navigateur
    localStorage.setItem('panier_est_vide', 'true');
    
    // 3. Mettre le compteur à 0
    updateBadge(0);
}

function updateBadge(nb) {
    const badge = document.querySelector('.cart-count'); // Assure-toi d'avoir cette classe sur ton chiffre "2"
    if(badge) badge.innerText = nb;
}

// Lancer la vérification au chargement
window.onload = chargerPanier;
</script>
</body>
</html>
