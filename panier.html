<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier | SKAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="logo">SKAI</div>
        <div class="header-right"></div>
    </header>

    <nav class="nav-menu" id="nav-menu">
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="boutique.html">Boutique</a></li>
            <li><a href="propos.html">À Propos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="cart-container">
        <h2 class="cart-title">Votre Panier</h2>

        <div class="cart-content">
            <div id="cart-items" class="cart-items">
                <div class="cart-item">
                    <div class="item-info">
                        <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=200" alt="Produit">
                        <div>
                            <h4>T-Shirt Nazir "Roots"</h4>
                            <p>15.000 FCFA</p>
                            <button class="remove-btn">Supprimer</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="cart-summary">
                <div class="summary-line">
                    <span>Sous-total</span>
                    <span id="subtotal">15.000 FCFA</span>
                </div>
                <div class="summary-line">
                    <span>Livraison (Dakar)</span>
                    <span>2.000 FCFA</span>
                </div>
                <hr>
                <div class="summary-line total">
                    <span>Total</span>
                    <strong id="final-total">17.000 FCFA</strong>
                </div>
                <button class="checkout-btn">Procéder au paiement</button>
            </div>
        </div>
    </main>

    <script>
    // --- GESTION DU MENU ---
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    hamburger.addEventListener('click', () => {
        navMenu.classList.toggle('active');
        hamburger.classList.toggle('active');
    });

    // --- LOGIQUE DU PANIER ---
    const prixLivraison = 2000; // Livraison fixe à Dakar

    function calculerTotal() {
        const items = document.querySelectorAll('.cart-item');
        let sousTotal = 0;

        items.forEach(item => {
            // On récupère le prix (on enlève " FCFA" et les points pour le calcul)
            const prixTexte = item.querySelector('.item-price').innerText;
            const prixNombre = parseInt(prixTexte.replace(/[^0-9]/g, ''));
            sousTotal += prixNombre;
        });

        const totalFinal = sousTotal + (sousTotal > 0 ? prixLivraison : 0);

        // Mise à jour de l'affichage
        document.getElementById('subtotal').innerText = sousTotal.toLocaleString() + " FCFA";
        document.getElementById('final-total').innerText = totalFinal.toLocaleString() + " FCFA";

        // Si le panier est vide
        if (items.length === 0) {
            document.getElementById('cart-items').innerHTML = "<p style='text-align:center; padding:50px;'>Votre panier est vide.</p>";
            document.getElementById('final-total').innerText = "0 FCFA";
            document.getElementById('subtotal').innerText = "0 FCFA";
        }
    }

    // --- GESTION DE LA SUPPRESSION ---
    document.getElementById('cart-items').addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-btn')) {
            const itemASupprimer = e.target.closest('.cart-item');
            
            // Petit effet visuel avant de supprimer
            itemASupprimer.style.opacity = '0';
            itemASupprimer.style.transform = 'translateX(-20px)';
            
            setTimeout(() => {
                itemASupprimer.remove();
                calculerTotal();
            }, 300);
        }
    });

    // --- BOUTON PAIEMENT ---
    document.querySelector('.checkout-btn').addEventListener('click', () => {
        const total = document.getElementById('final-total').innerText;
        if (total === "0 FCFA") {
            alert("Votre panier est vide !");
        } else {
            alert("Redirection vers le paiement sécurisé... Montant : " + total);
            // Ici on pourra lier une API comme PayTech ou Wave plus tard
        }
    });

    // Initialisation au chargement
    calculerTotal();

    </script>
</body>
</html>
