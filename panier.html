<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier | SKAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="logo">SKAI</div>
        <div class="header-right"></div>
    </header>

    <nav class="nav-menu" id="nav-menu">
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="boutique.html">Boutique</a></li>
            <li><a href="propos.html">À Propos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="cart-container">
        <h2 class="cart-title">Votre Panier</h2>

        <div class="cart-content">
            <div id="cart-items" class="cart-items">
                <div class="cart-item">
                    <div class="item-info">
                        <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=200" alt="Produit">
                        <div>
                            <h4>T-Shirt Nazir "Roots"</h4>
                            <p>15.000 FCFA</p>
                            <button class="remove-btn">Supprimer</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="cart-summary">
                <div class="summary-line">
                    <span>Sous-total</span>
                    <span id="subtotal">15.000 FCFA</span>
                </div>
                <div class="summary-line">
                    <span>Livraison (Dakar)</span>
                    <span>2.000 FCFA</span>
                </div>
                <hr>
                <div class="summary-line total">
                    <span>Total</span>
                    <strong id="final-total">17.000 FCFA</strong>
                </div>
                <button class="checkout-btn">Procéder au paiement</button>
            </div>
        </div>
    </main>

    <script>
        // Menu Hamburger
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        });

        // Ici on ajoutera plus tard la logique pour supprimer et calculer
    </script>
</body>
</html>
