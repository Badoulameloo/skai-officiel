<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Panier - SKAÏ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* On cache tout par défaut, le JS décidera quoi afficher */
        #full-cart-ui, #empty-cart-msg { display: none; }
        
        body { font-family: 'Helvetica', sans-serif; margin: 0; background-color: #fff; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #eee; }
        .logo { font-size: 1.8rem; letter-spacing: 6px; font-weight: bold; text-decoration: none; color: black; }
        .cart-count { background: #33241e; color: white; padding: 2px 8px; border-radius: 50%; font-size: 0.8rem; }
        .cart-container { max-width: 1000px; margin: 50px auto; padding: 0 20px; display: flex; gap: 40px; flex-wrap: wrap; }
        .cart-items { flex: 2; min-width: 300px; }
        .cart-summary { flex: 1; min-width: 300px; background: #f9f9f9; padding: 30px; border-radius: 4px; height: fit-content; }
        .product-card { display: flex; gap: 20px; padding: 20px 0; border-bottom: 1px solid #eee; }
        .product-card img { width: 110px; height: 140px; object-fit: cover; }
        .checkout-btn { width: 100%; background: #33241e; color: white; border: none; padding: 15px; text-transform: uppercase; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #empty-cart-msg { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SKAÏ</a>
        <div class="nav-links">
            <a href="index.html" style="text-decoration: none; color: black; margin-right: 20px;">Accueil</a>
            <a href="panier.html" style="text-decoration: none; color: black;">Panier (<span id="nav-counter" class="cart-count">0</span>)</a>
        </div>
    </nav>

    <main>
        <div id="full-cart-ui">
            <h1 style="text-align: center; margin-top: 40px; letter-spacing: 3px;">VOTRE PANIER</h1>
            
            <div class="cart-container">
                <div class="cart-items">
                    <div class="product-card">
                        <img src="produit1.jpg" alt="Produit SKAÏ">
                        <div class="product-info">
                            <h3 id="display-name" style="margin: 0;">PRODUIT SKAÏ</h3>
                            <p style="margin: 5px 0; color: #888;">Taille : <span id="display-size" style="font-weight: bold;">-</span></p>
                            <p style="margin: 10px 0; color: #666; font-weight: bold;">15 000 FCFA</p>
                            <button onclick="supprimerDuPanier()" style="background:none; border:none; color: #b22222; text-decoration: underline; cursor:pointer; padding:0;">Supprimer</button>
                        </div>
                    </div>
                </div>

                <div class="cart-summary">
    <h2>RÉSUMÉ</h2>
    <div style="display: flex; justify-content: space-between; margin: 20px 0;">
        <span>Sous-total</span>
        <span id="sous-total">0 FCFA</span> </div>
    ...
    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-top: 15px;">
        <span>TOTAL</span>
        <span id="total-prix">0 FCFA</span> </div>
    ...
</div>

                    <button type="button" onclick="window.location.href='paiement.html'" class="checkout-btn">
                        PROCÉDER AU PAIEMENT
                    </button>
                </div>
            </div>
        </div>

        <div id="empty-cart-msg">
            <h2>VOTRE PANIER EST VIDE</h2>
            <p>On dirait que vous n'avez rien ajouté pour le moment.</p>
            <a href="boutique.html" style="color: #33241e; font-weight: bold;">RETOURNER À LA BOUTIQUE</a>
        </div>
    </main>

    <script>
    function verifierPanier() {
    const panier = JSON.parse(localStorage.getItem('skai_panier')) || [];
    const fullUI = document.getElementById('full-cart-ui');
    const emptyMsg = document.getElementById('empty-cart-msg');
    const counter = document.getElementById('nav-counter');
    const containerProduits = document.querySelector('.cart-items');

    if (counter) counter.innerText = panier.length;

    if (panier.length > 0) {
        fullUI.style.display = 'block';
        emptyMsg.style.display = 'none';
        containerProduits.innerHTML = '';

        let totalGeneral = 0; // On initialise le calcul

        panier.forEach((produit, index) => {
            // On transforme le prix "15.000 FCFA" en nombre (15000) pour le calcul
            const prixNumerique = 15000; 
            totalGeneral += prixNumerique;

            containerProduits.innerHTML += `
                <div class="product-card">
                    <img src="produit1.jpg" alt="${produit.nom}">
                    <div class="product-info">
                        <h3>${produit.nom}</h3>
                        <p>Taille : ${produit.taille}</p>
                        <p>${prixNumerique.toLocaleString()} FCFA</p>
                        <button onclick="supprimerArticle(${index})">Supprimer</button>
                    </div>
                </div>
            `;
        });

        // MISE À JOUR DES PRIX DANS LE RÉSUMÉ
        // On cherche les éléments par leur ID ou leur place dans le résumé
        const sousTotalElement = document.getElementById('sous-total') || document.querySelector('.cart-summary div span:last-child');
        const totalElement = document.getElementById('total-prix') || document.querySelector('.cart-summary .total-amount') || document.querySelectorAll('.cart-summary div span')[3];

        if (sousTotalElement) sousTotalElement.innerText = totalGeneral.toLocaleString() + " FCFA";
        
        // On met à jour le TOTAL (en bas du résumé)
        // Note: Si tu n'as pas d'ID, on va cibler le dernier span du bloc résumé
        const spans = document.querySelectorAll('.cart-summary span');
        if (spans.length >= 4) {
            spans[1].innerText = totalGeneral.toLocaleString() + " FCFA"; // Sous-total
            spans[3].innerText = totalGeneral.toLocaleString() + " FCFA"; // Total
        }

    } else {
        fullUI.style.display = 'none';
        emptyMsg.style.display = 'block';
    }
}

    function supprimerArticle(index) {
        let panier = JSON.parse(localStorage.getItem('skai_panier')) || [];
        
        // On retire l'article précis grâce à son index
        panier.splice(index, 1);
        
        // On sauvegarde le nouveau tableau
        localStorage.setItem('skai_panier', JSON.stringify(panier));
        
        // Si c'est vide, on remet l'état vide
        if (panier.length === 0) {
            localStorage.setItem('skai_panier_vide', 'true');
        }

        // On rafraîchit la page
        verifierPanier();
    }

    window.onload = verifierPanier;
</script>
</body>
</html>
