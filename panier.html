<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Panier - SKAÏ</title>
    <link rel="stylesheet" href="style.css">
    <style>
    /* 1. On cache TOUT par défaut pour éviter le flash du produit */
    #full-cart-ui, #empty-cart-msg { display: none; }
    
    /* Tes autres styles restent les mêmes... */
    body { font-family: 'Helvetica', sans-serif; margin: 0; background-color: #fff; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #eee; }
    .logo { font-size: 1.8rem; letter-spacing: 6px; font-weight: bold; text-decoration: none; color: black; }
    .cart-count { background: #33241e; color: white; padding: 2px 8px; border-radius: 50%; font-size: 0.8rem; }
    .cart-container { max-width: 1000px; margin: 50px auto; padding: 0 20px; display: flex; gap: 40px; }
    .cart-items { flex: 2; }
    .cart-summary { flex: 1; background: #f9f9f9; padding: 30px; border-radius: 4px; height: fit-content; }
    .product-card { display: flex; gap: 20px; padding: 20px 0; border-bottom: 1px solid #eee; }
    .product-card img { width: 110px; height: 140px; object-fit: cover; }
    .checkout-btn { width: 100%; background: #33241e; color: white; border: none; padding: 15px; text-transform: uppercase; font-weight: bold; cursor: pointer; margin-top: 20px; }
    #empty-cart-msg { text-align: center; margin-top: 100px; }
</style>

<script>
    // 2. ON VÉRIFIE AVANT MÊME QUE LE RESTE DE LA PAGE CHARGE
    (function() {
        const estVide = localStorage.getItem('skai_panier_vide');
        // Si c'est la première visite ou si ce n'est pas marqué "vide", on force l'affichage du produit
        if (estVide === null || estVide === 'false') {
            document.write('<style>#full-cart-ui { display: block !important; }</style>');
        } else {
            document.write('<style>#empty-cart-msg { display: block !important; }</style>');
        }
    })();
</script>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SKAÏ</a>
        <div class="nav-links">
            <a href="index.html" style="text-decoration: none; color: black; margin-right: 20px;">Accueil</a>
            <a href="panier.html" style="text-decoration: none; color: black;">Panier (<span id="nav-counter" class="cart-count">1</span>)</a>
        </div>
    </nav>

    <main>
        <div id="full-cart-ui">
            <h1 style="text-align: center; margin-top: 40px; letter-spacing: 3px;">VOTRE PANIER</h1>
            
            <div class="cart-container">
                <div class="cart-items">
                    <div class="product-card">
                        <img src="produit1.jpg" alt="Produit SKAÏ">
                        <div class="product-info">
                            <h3 style="margin: 0;">PRODUIT SKAÏ - ESSENTIAL</h3>
                            <p style="margin: 10px 0; color: #666;">15 000 FCFA</p>
                            <button onclick="supprimerDuPanier()" style="background:none; border:none; color: #b22222; text-decoration: underline; cursor:pointer; padding:0;">Supprimer</button>
                        </div>
                    </div>
                </div>

                <div class="cart-summary">
                    <h2 style="margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #ddd; padding-bottom: 10px;">RÉSUMÉ</h2>
                    <div style="display: flex; justify-content: space-between; margin: 20px 0;">
                        <span>Sous-total</span>
                        <span>15 000 FCFA</span>
                    </div>
                    <p style="font-size: 0.8rem; color: #888; font-style: italic;">Livraison calculée à l'étape suivante.</p>
                    <hr style="border: 0; border-top: 1px solid #ddd;">
                    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-top: 15px;">
                        <span>TOTAL</span>
                        <span>15 000 FCFA</span>
                    </div>

                    <button type="button" onclick="window.location.href='paiement.html'" class="checkout-btn">
                        PROCÉDER AU PAIEMENT
                    </button>
                </div>
            </div>
        </div>

        <div id="empty-cart-msg">
            <h2>VOTRE PANIER EST VIDE</h2>
            <p>On dirait que vous n'avez rien ajouté pour le moment.</p>
            <a href="index.html">RETOURNER À LA BOUTIQUE</a>
        </div>
    </main>

    <script>
        // Fonction qui s'exécute dès que la page s'affiche
        function verifierPanier() {
            const estVide = localStorage.getItem('skai_panier_vide');
            
            // Si la mémoire dit que c'est vide OU si on n'a jamais rien mis
            if (estVide === 'true') {
                document.getElementById('full-cart-ui').style.display = 'none';
                document.getElementById('empty-cart-msg').style.display = 'block';
                document.getElementById('nav-counter').innerText = '0';
            } else {
                document.getElementById('full-cart-ui').style.display = 'block';
                document.getElementById('empty-cart-msg').style.display = 'none';
                document.getElementById('nav-counter').innerText = '1';
            }
        }

        // Fonction pour supprimer l'article
        function supprimerDuPanier() {
            // On enregistre "vrai" pour le vide dans la mémoire
            localStorage.setItem('skai_panier_vide', 'true');
            // On relance la vérification pour mettre à jour l'écran
            verifierPanier();
        }

        // Lancement au chargement
        window.onload = verifierPanier;
    </script>

</body>
</html>
