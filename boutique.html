<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique | SKAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-left">
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </div>
    <div class="logo">SKAI</div>
    <div class="header-right">
        <a href="panier.html" class="cart-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span id="cart-count">0</span>
        </a>
    </div>
</header>

<main class="shop-container">
    <header class="shop-header" style="text-align: center; padding: 40px 0;">
        <h2 style="letter-spacing: 5px; text-transform: uppercase;">La Collection</h2>
        <p style="color: #888;">From Sénégal</p>
    </header>

    <section class="product-grid">
        <div class="product-card">
            <div class="product-image">
                <img src="produit1.jpg" alt="T-Shirt Nazir Roots">
                <a href="produit-detail.html" class="quick-add" style="text-decoration: none; text-align: center;">Voir détails</a>
            </div>
            <div class="product-info">
                <h3>T-Shirt Nazir "Roots"</h3>
                <p>15.000 FCFA</p>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <img src="produit2.jpg" alt="Hoodie Signature">
                <a href="produit-detail.html" class="quick-add" style="text-decoration: none; text-align: center;">Voir détails</a>
            </div>
            <div class="product-info">
                <h3>Hoodie Signature</h3>
                <p>25.000 FCFA</p>
            </div>
        </div>
    </section>
</main>

<script>
    // --- GESTION DU MENU ---
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    if(hamburger) {
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        });
    }

    function updateCartCount() {
    const countElement = document.getElementById('cart-count') || document.getElementById('nav-counter');
    const estVide = localStorage.getItem('skai_panier_vide');

    if (countElement) {
        // Strictement 'false' veut dire qu'il y a un produit
        if (estVide === 'false') {
            countElement.innerText = "1";
        } else {
            countElement.innerText = "0";
            // On s'assure que si c'est vide, c'est bien marqué 'true'
            localStorage.setItem('skai_panier_vide', 'true');
        }
    }
}
window.addEventListener('pageshow', updateCartCount);
updateCartCount();
    

    // Force la mise à jour quand on arrive sur la page
    window.onload = updateCartCount;

    // Force la mise à jour même si on revient en arrière avec le bouton "Précédent"
    window.addEventListener('pageshow', function(event) {
        updateCartCount();
        function syncCart() {
        const countElement = document.getElementById('cart-count') || document.getElementById('nav-counter');
        const estVide = localStorage.getItem('skai_panier_vide');

        if (countElement) {
            if (estVide === 'false') {
                countElement.innerText = "1";
            } else {
                countElement.innerText = "0";
            }
        }
    }

    // Se lance au chargement
    window.onload = syncCart;
    // Se lance quand on revient en arrière
    window.onpageshow = syncCart;
    });
</script>
</script>
</body>
</html>
