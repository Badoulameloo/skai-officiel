<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique | SKAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div class="logo">SKAI</div>
        <div class="header-right"></div>
    </header>

    <nav class="nav-menu" id="nav-menu">
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="boutique.html">Boutique</a></li>
            <li><a href="propos.html">À Propos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="shop-container">
        <header class="shop-header">
            <h2>La Collection</h2>
            <p>Sénégal — Design Organique</p>
        </header>

        <section class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=800&q=80" alt="T-shirt Nazir">
                    <div class="quick-add">Ajouter au panier</div>
                </div>
                <div class="product-info">
                    <h3>T-Shirt Nazir "Roots"</h3>
                    <p>15.000 FCFA</p>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=800&q=80" alt="Hoodie Nazir">
                    <div class="quick-add">Ajouter au panier</div>
                </div>
                <div class="product-info">
                    <h3>Hoodie Signature</h3>
                    <p>25.000 FCFA</p>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=800&q=80" alt="Accessoire">
                    <div class="quick-add">Ajouter au panier</div>
                </div>
                <div class="product-info">
                    <h3>Casquette Essence</h3>
                    <p>10.000 FCFA</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        });
    </script>
</body>
</html>
