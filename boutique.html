<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique | SKAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
    <div class="header-left">
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="logo">SKAI</div>
    
    <div class="header-right">
        <a href="panier.html" class="cart-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span id="cart-count">0</span>
        </a>
    </div>
</header>

    <nav class="nav-menu" id="nav-menu">
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="boutique.html">Boutique</a></li>
            <li><a href="propos.html">À Propos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="shop-container">
        <header class="shop-header">
            <h2>La Collection</h2>
            <p>Sénégal — Design Organique</p>
        </header>

        <section class="product-grid">
    <div class="product-card">
        <div class="product-image">
            <img src="" alt="Produit1 SKAI">
            <div class="quick-add" 
                 data-name="T-Shirt Nazir Roots" 
                 data-price="15000" 
                 data-image="">
                 Ajouter au panier
            </div>
        </div>
        <div class="product-info">
            <h3>T-Shirt Nazir "Roots"</h3>
            <p>15.000 FCFA</p>
        </div>
    </div>

    <div class="product-card">
        <div class="product-image">
            <img src="" alt="Produit2 SKAI">
            <div class="quick-add" 
                 data-name="Hoodie Signature" 
                 data-price="25000" 
                 data-image="">
                 Ajouter au panier
            </div>
        </div>
        <div class="product-info">
            <h3>Hoodie Signature</h3>
            <p>25.000 FCFA</p>
        </div>
    </div>

            <div class="product-card">
        <div class="product-image">
            <img src="" alt="Produit3 SKAI">
            <div class="quick-add" 
                 data-name="Hoodie Signature" 
                 data-price="25000" 
                 data-image="">
                 Ajouter au panier
            </div>
        </div>
        <div class="product-info">
            <h3>Hoodie Signature</h3>
            <p>25.000 FCFA</p>
        </div>
    </div>
        </section>
    </main>

    <script>
    // --- GESTION DU MENU ---
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    hamburger.addEventListener('click', () => {
        navMenu.classList.toggle('active');
        hamburger.classList.toggle('active');
    });

    // --- FONCTION COMPTEUR ---
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('skai-cart')) || [];
        document.getElementById('cart-count').innerText = cart.length;
    }

    // --- AJOUT AU PANIER ---
    const buttons = document.querySelectorAll('.quick-add');

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            // 1. Récupérer les infos du produit cliqué
            const product = {
                name: btn.getAttribute('data-name'),
                price: parseInt(btn.getAttribute('data-price')),
                image: btn.getAttribute('data-image')
            };

            // 2. Récupérer le panier actuel
            let cart = JSON.parse(localStorage.getItem('skai-cart')) || [];

            // 3. Ajouter le nouveau produit
            cart.push(product);

            // 4. Sauvegarder dans la mémoire du navigateur (localStorage)
            localStorage.setItem('skai-cart', JSON.stringify(cart));

            // 5. Mettre à jour le compteur en haut à droite
            updateCartCount();

            // 6. Petite animation de confirmation
            btn.innerText = "Ajouté ! ✓";
            btn.style.backgroundColor = "#27ae60"; // Vert succès discret
            
            setTimeout(() => {
                btn.innerText = "Ajouter au panier";
                btn.style.backgroundColor = "var(--marron-skai)";
            }, 1500);
        });
    });

    // Initialisation au chargement
    updateCartCount();
</script>
</body>
</html>
