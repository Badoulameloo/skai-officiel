<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique | SKAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-left">
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="logo">SKAI</div>
    
    <div class="header-right">
        <a href="panier.html" class="cart-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span id="cart-count">0</span>
        </a>
    </div>
</header>

    <nav class="nav-menu" id="nav-menu">
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="boutique.html">Boutique</a></li>
            <li><a href="propos.html">À Propos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="shop-container">
        <header class="shop-header" style="text-align: center; padding: 40px 0;">
            <h2 style="letter-spacing: 5px; text-transform: uppercase;">La Collection</h2>
            <p style="color: #888;">From Sénégal</p>
        </header>

        <section class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="produit1.jpg" alt="Produit1 SKAI">
                    <div class="quick-add" onclick="ajouterAuPanier()">Ajouter au panier</div>
                </div>
                <div class="product-info">
                    <h3>T-Shirt Nazir "Roots"</h3>
                    <p>15.000 FCFA</p>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="produit2.jpg" alt="Produit2 SKAI">
                    <div class="quick-add" onclick="ajouterAuPanier()">Ajouter au panier</div>
                </div>
                <div class="product-info">
                    <h3>Hoodie Signature</h3>
                    <p>25.000 FCFA</p>
                </div>
            </div>
        </section>
    </main>

    <script>
    // --- GESTION DU MENU ---
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    hamburger.addEventListener('click', () => {
        navMenu.classList.toggle('active');
        hamburger.classList.toggle('active');
    });

    // --- FONCTION AJOUT AU PANIER (SYNCHRONISÉE) ---
    function ajouterAuPanier() {
        // On dit à la mémoire que le panier n'est plus vide
        localStorage.setItem('skai_panier_vide', 'false');
        
        // On met à jour le chiffre en haut immédiatement
        updateCartCount();

        // Animation visuelle sur le bouton (optionnel)
        alert("Produit ajouté au panier !");
    }

    // --- MISE À JOUR DU COMPTEUR ---
    function updateCartCount() {
        const countElement = document.getElementById('cart-count');
        const estVide = localStorage.getItem('skai_panier_vide');

        if (countElement) {
            if (estVide === 'false') {
                countElement.innerText = "1";
            } else {
                countElement.innerText = "0";
            }
        }
    }

    // Initialisation au chargement
    updateCartCount();
</script>
</body>
</html>
