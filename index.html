<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKAI | Boutique Officielle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-left">
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="logo">SKAI</div>
    
    <div class="header-right">
        <a href="panier.html" class="cart-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span id="cart-count">0</span>
        </a>
    </div>
</header>

    <nav class="nav-menu" id="nav-menu">
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="boutique.html">Boutique</a></li>
            <li><a href="propos.html">À Propos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <h1>Notre Collection</h1>
            <p>Each piece is designed to be worn your way.</p>
            <a href="boutique.html" onclick="localStorage.setItem('skai_panier_vide', 'false')" class="btn">Découvrir</a>
        </section>
    </main>

    <script>
    // --- 1. GESTION DU MENU MOBILE ---
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');

    if (hamburger && navMenu) {
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        });

        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                hamburger.classList.remove('active');
            });
        });
    }

    // --- 2. FONCTION UNIQUE POUR LE COMPTEUR ---
    function updateCartCount() {
        // On cherche l'élément du compteur (ID ou Classe)
        const countElement = document.getElementById('cart-count') || document.querySelector('.cart-count') || document.getElementById('nav-counter');
        
        if (countElement) {
            // On récupère le tableau des produits
            const panier = JSON.parse(localStorage.getItem('skai_panier')) || [];
            
            // On affiche le nombre REEL d'articles dans le tableau
            countElement.innerText = panier.length;
        }
    }

    // --- 3. DECLENCHEURS (On enlève les doublons) ---

    // Au chargement de la page
    window.addEventListener('load', updateCartCount);

    // Au retour sur la page (bouton précédent du navigateur)
    window.addEventListener('pageshow', updateCartCount);

    // Si tu modifies le panier dans un autre onglet
    window.addEventListener('storage', updateCartCount);

    // Lancement immédiat
    updateCartCount();
</script>
</body>
</html>
