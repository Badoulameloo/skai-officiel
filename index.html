<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKAI | Boutique Officielle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-left">
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="logo">SKAI</div>
    
    <div class="header-right">
        <a href="panier.html" class="cart-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span id="cart-count">0</span>
        </a>
    </div>
</header>

    <nav class="nav-menu" id="nav-menu">
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="boutique.html">Boutique</a></li>
            <li><a href="propos.html">À Propos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <h1>Notre Collection</h1>
            <p>Each piece is designed to be worn your way.</p>
            <a href="boutique.html" onclick="localStorage.setItem('skai_panier_vide', 'false')" class="btn">Découvrir</a>
        </section>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');

        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        });

        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                hamburger.classList.remove('active');
            });
        });

       function updateCartCount() {
        // On récupère l'élément du compteur (vérifie bien que l'ID est 'cart-count')
        const countElement = document.getElementById('cart-count') || document.querySelector('.cart-count');
        
        // On récupère le tableau des produits
        const panier = JSON.parse(localStorage.getItem('skai_panier')) || [];
        
        if (countElement) {
            // On affiche le nombre réel d'articles
            countElement.innerText = panier.length;
        }
    }

    // Se lance dès que la page est chargée
    window.onload = updateCartCount;

    // Se lance quand on revient en arrière (très important pour le mobile)
    window.addEventListener('pageshow', updateCartCount);
    
        function syncCart() {
        const countElement = document.getElementById('cart-count') || document.getElementById('nav-counter');
        const estVide = localStorage.getItem('skai_panier_vide');

        if (countElement) {
            if (estVide === 'false') {
                countElement.innerText = "1";
            } else {
                countElement.innerText = "0";
            }
        }
    }

    // Se lance au chargement
    window.onload = syncCart;
    // Se lance quand on revient en arrière
    window.onpageshow = syncCart;

        // Appeler au chargement
        updateCartCount();
    </script>
</body>
</html>
