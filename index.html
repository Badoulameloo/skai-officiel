<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKAI | Boutique Officielle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="logo">SKAI</div>
        
        <div class="header-right">
            </div>
    </header>

    <nav class="nav-menu" id="nav-menu">
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="boutique.html">Boutique</a></li>
            <li><a href="propos.html">À Propos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <h1>Nouvelle Collection</h1>
            <p>L'essence du style minimaliste.</p>
            <a href="boutique.html" class="btn">Découvrir</a>
        </section>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');

        hamburger.addEventListener('click', () => {
            // On active/désactive le menu et la croix en même temps
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        });

        // Optionnel : Fermer le menu si on clique sur un lien
        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                hamburger.classList.remove('active');
            });
        });
    </script>
</body>
</html>
