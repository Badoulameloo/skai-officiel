<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - SKAÏ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">SKAÏ</div>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="boutique.html">Boutique</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="checkout-container">
            <h1>Finaliser ma commande</h1>
            
            <form id="payment-form">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" required placeholder="Votre nom">
                </div>
                
                <div class="form-group">
                    <label>Téléphone (Orange Money / Wave)</label>
                    <input type="tel" required placeholder="77 000 00 00">
                </div>

                <div class="form-group">
                    <label>Zone de Livraison (Dakar)</label>
                    <select id="zone-livraison" required>
                        <option value="1500">Dakar Plateau / Médina (1500 FCFA)</option>
                        <option value="2000">Ouakam / Ngor / Almadies (2000 FCFA)</option>
                        <option value="2500">Guédiawaye / Pikine (2500 FCFA)</option>
                        <option value="3000">Rufisque / Diamniadio (3000 FCFA)</option>
                    </select>
                </div>

                <div class="payment-methods">
                    <h3>Mode de paiement</h3>
                    <p>Le paiement se fera à la livraison ou via Wave/OM après confirmation par téléphone.</p>
                </div>

                <button type="submit" class="btn-pay">Confirmer la commande</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 SKAÏ - Design by Badoulameloo</p>
    </footer>
</body>
</html>
